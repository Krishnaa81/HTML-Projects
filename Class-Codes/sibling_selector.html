<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>

        h1~h2{
            background-color: tomato;          /*  general sibling selector */
        }

        p~div{
            color: chocolate;                  
        }

        p+div{
            background-color: rgb(18, 17, 17);            /* adjecent sibling selector */
        }
        
        p+p{
            background-color: bisque;
        }


        input[required]{
            
        }

    </style>
</head>
<body>
    <h1>h1 is sbling</h1>
    <h2>h1 is sbling</h2>

    <p>p is chandra</p>
    <div>
        <h3>h3 tag</h3>
        <p>p is orage</p>
        <h2>hello world</h2>
    </div>
    <h2>hello everyone</h2>

    <p>number 1</p>
    <p>number 2</p>
    <h1>number 3</h1>

    <form action="">

        <label for="">Hlo krishna</label>
        <input type="text" required>

    </form>

    

</body>
</html>

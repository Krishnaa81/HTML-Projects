<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 5px solid black;
            background-color: black;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            height: 600px;

            /* grid-template-areas:
            "item1 item1 item2"
            "item3 item4 item5"
            "item6 item7 item5";
            padding: 5px;
            margin:auto; */
            


        }
        .box1{
            background-color: rgb(80, 145, 202);
            text-align: center;
            padding: 10px;
            grid-area: item1;
            border-radius: 5px;

        }
        .box2{
            background-color: aqua;
            text-align: center;
            padding: 10px;
            grid-area: item2;
            border-radius: 5px;
        }
        .box3{
            background-color: aquamarine;
            text-align: center;
            padding: 10px;
            grid-area: item3;
            border-radius: 5px;

        }
        .box4{
            background-color: bisque;
            text-align: center;
            padding: 10px;
            grid-area: item4;
            border-radius: 5px;
        }
        .box5{
            background-color: chartreuse;
            text-align: center;
            padding: 10px;
            grid-area: item5;
            border-radius: 5px;
        }
        .box6{
            background-color: chocolate;
            text-align: center;
            padding: 10px;
            grid-area: item6;
            border-radius: 5px;
        }
        .box7{
            background-color: cornflowerblue;
            text-align: center;
            padding: 10px;
            grid-area: item7;
            border-radius: 5px;
        }

    </style>
</head>
<body>
    <div class="container">

        <div class="box1">item1
            <p>Better now closer</p>
        </div>

        <div class="box2">item2
            <p>Shackend</p>
        </div>

        <div class="box3">item3
            <p>Team Adaption</p>
        </div>

        <div class="box4">item4
            <p>sync</p>
        </div>

        <div class="box5">item5
            <p>Bring people together</p>
        </div>

        <div class="box6">item6
            <p>hello all</p>
        </div>

        <div class="box7">item7
            <p>who are you</p>
        </div>

    </div>
</body>
</html>
